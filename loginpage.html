<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Signup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card shadow p-4">
        
        <!-- Login Form -->
        <div id="loginForm">
          <h3 class="text-center mb-3">Login</h3>

          <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Enter email">
          <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Enter password">

          <button onclick="login()" class="btn btn-primary w-100">Login</button>

          <p class="text-center mt-3">
            Don't have an account?
            <span style="color:blue; cursor:pointer;" onclick="toggleForms()">Sign Up</span>
          </p>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" style="display:none;">
          <h3 class="text-center mb-3">Sign Up</h3>

          <input type="email" id="signupEmail" class="form-control mb-3" placeholder="Enter email">
          <input type="password" id="signupPassword" class="form-control mb-3" placeholder="Create password">

          <button onclick="signup()" class="btn btn-success w-100">Sign Up</button>

          <p class="text-center mt-3">
            Already have an account?
            <span style="color:blue; cursor:pointer;" onclick="toggleForms()">Login</span>
          </p>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  function toggleForms() {
    const login = document.getElementById('loginForm');
    const signup = document.getElementById('signupForm');

    if (login.style.display === 'none') {
      login.style.display = 'block';
      signup.style.display = 'none';
    } else {
      login.style.display = 'none';
      signup.style.display = 'block';
    }
  }
</script>

<!-- Firebase script -->
<script type="module" src="script.js"></script>

</body>
</html>
